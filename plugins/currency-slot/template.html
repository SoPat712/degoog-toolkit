<div class="cxs-wrap" data-rate="{{rate_for_js}}" data-currencies='{{cur_list_json}}'>
  <div class="cxs-header">
    <svg width="28" height="28" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="10" fill="rgba(255,255,255,0.12)"/>
      <text x="10" y="13.5" font-size="11" font-weight="700" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">$</text>
    </svg>
    <span class="cxs-title">Currency</span>
  </div>

  <div class="cxs-main">
    <div class="cxs-row" id="cxs-from-row">
      <div class="cxs-flag" id="cxs-from-flag">{{from_flag}}</div>
      <div class="cxs-input-wrap">
        <div class="cxs-label">Amount</div>
        <input class="cxs-amount" id="cxs-amount" type="number" value="{{amount_for_js}}" min="0"/>
      </div>
      <button class="cxs-cur-btn" id="cxs-from-btn">
        <div>
          <div class="cxs-cur-code" id="cxs-from-code">{{from_code}}</div>
          <div class="cxs-cur-name" id="cxs-from-name">{{from_name}}</div>
        </div>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="cxs-divider">
      <button class="cxs-swap" id="cxs-swap">
        <span class="cxs-swap-inner">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 4.5h9M8 2l3 2.5L8 7M11 8.5H2M5 6l-3 2.5L5 11"/>
          </svg>
        </span>
      </button>
    </div>

    <div class="cxs-row">
      <div class="cxs-flag" id="cxs-to-flag">{{to_flag}}</div>
      <div class="cxs-input-wrap">
        <div class="cxs-label">Result</div>
        <div class="cxs-result" id="cxs-result">{{result}}</div>
      </div>
      <button class="cxs-cur-btn" id="cxs-to-btn">
        <div>
          <div class="cxs-cur-code" id="cxs-to-code">{{to_code}}</div>
          <div class="cxs-cur-name" id="cxs-to-name">{{to_name}}</div>
        </div>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="cxs-rate-bar">
      <span>1 <span id="cxs-rate-from">{{from_code}}</span> = <span class="cxs-rate-val" id="cxs-rate-val">{{rate}} {{to_code}}</span></span>
      <span class="cxs-updated">Live rate</span>
    </div>
  </div>

  <div class="cxs-quick">
    <span class="cxs-ql">Quick:</span>
    <button class="cxs-q" data-v="100">100</button>
    <button class="cxs-q" data-v="500">500</button>
    <button class="cxs-q" data-v="1000">1 000</button>
    <button class="cxs-q" data-v="5000">5 000</button>
    <button class="cxs-q" data-v="10000">10 000</button>
  </div>

  <div class="cxs-pairs-label">Popular pairs</div>
  <div class="cxs-pairs" id="cxs-pairs">{{pairs_html}}</div>

  <!-- Currency picker dropdown -->
  <div class="cxs-picker" id="cxs-picker" style="display:none">
    <div class="cxs-picker-top">
      <input class="cxs-picker-search" id="cxs-picker-search" placeholder="Search currency..." autocomplete="off"/>
      <button class="cxs-picker-close" id="cxs-picker-close">✕</button>
    </div>
    <div class="cxs-picker-list" id="cxs-picker-list"></div>
  </div>
</div>
