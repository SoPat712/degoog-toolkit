<div class="wxs-wrap">
  <div class="wxs-top">
    <div id="wxs-main">
      <div class="wxs-city">{{city}}</div>
      <div class="wxs-temp-row">
        <span class="wxs-num" id="wxs-temp">{{temp}}</span>
        <span class="wxs-deg" id="wxs-unit">{{unit}}</span>
      </div>
      <div class="wxs-desc" id="wxs-desc">{{desc}}</div>
      <div class="wxs-feels" id="wxs-feels">Feels like {{feels}}{{unit2}} &nbsp;·&nbsp; H {{hi}}{{unit3}} / L {{lo}}{{unit4}}</div>
    </div>
    <div class="wxs-icon-wrap">
      <div class="wxs-icon-inner wxs-icon-in" id="wxs-icon"></div>
    </div>
  </div>

  <div class="wxs-stats">
    <div class="wxs-st"><div class="wxs-st-l">Humidity</div><div class="wxs-st-v">{{humidity}}%</div></div>
    <div class="wxs-st"><div class="wxs-st-l">Wind</div><div class="wxs-st-v">{{wind}}</div></div>
    <div class="wxs-st"><div class="wxs-st-l">Pressure</div><div class="wxs-st-v">{{pressure}} hPa</div></div>
    <div class="wxs-st"><div class="wxs-st-l">UV index</div><div class="wxs-st-v">{{uv}}</div></div>
  </div>

  <div class="wxs-sun-row">
    <div><div class="wxs-st-l">Sunrise</div><div class="wxs-sun-time" id="wxs-sunrise">{{sunrise}}</div></div>
    <div class="wxs-sun-bar">
      <div class="wxs-sun-fill" id="wxs-sun-fill" style="width:{{sun_pct}}%"></div>
      <div class="wxs-sun-dot" id="wxs-sun-dot" style="left:{{sun_pct}}%"></div>
    </div>
    <div style="text-align:right"><div class="wxs-st-l">Sunset</div><div class="wxs-sun-time" id="wxs-sunset">{{sunset}}</div></div>
  </div>

  <div class="wxs-fl">7-day forecast <span class="wxs-fl-hint">· tap day for hourly</span></div>
  <div class="wxs-days" id="wxs-days"></div>
  <div class="wxs-hourly" id="wxs-hourly">
    <div class="wxs-hourly-scroll" id="wxs-hourly-inner"></div>
  </div>

  <script>
  (function(){
    var DAYS = {{days_json}};
    var UNIT = "{{unit}}";
    var activeDay = -1;
    var hourlyOpen = false;

    var ICONS = {
      sun: function(){
        return '<div class="wxs-ani-sun"><svg width="56" height="56" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="11" fill="#f59e0b" opacity=".9"/><g style="animation:wxs-spin 12s linear infinite;transform-origin:28px 28px"><line x1="28" y1="5" x2="28" y2="11" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".7"/><line x1="28" y1="45" x2="28" y2="51" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".7"/><line x1="5" y1="28" x2="11" y2="28" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".7"/><line x1="45" y1="28" x2="51" y2="28" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".7"/><line x1="12" y1="12" x2="16" y2="16" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".55"/><line x1="40" y1="40" x2="44" y2="44" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".55"/><line x1="44" y1="12" x2="40" y2="16" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".55"/><line x1="12" y1="44" x2="16" y2="40" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity=".55"/></g></svg></div>';
      },
      partly: function(){
        return '<div class="wxs-ani-float"><div style="position:relative;width:68px;height:56px"><div style="position:absolute;top:2px;left:4px;width:24px;height:24px;border-radius:50%;background:#f59e0b;opacity:.8"></div><div style="position:absolute;bottom:2px;left:10px;right:0;height:24px;background:var(--text-secondary);opacity:.5;border-radius:12px"></div><div style="position:absolute;width:22px;height:22px;background:var(--text-secondary);opacity:.5;border-radius:50%;bottom:12px;left:12px"></div><div style="position:absolute;width:17px;height:17px;background:var(--text-secondary);opacity:.5;border-radius:50%;bottom:14px;left:28px"></div></div></div>';
      },
      cloud: function(){
        return '<div class="wxs-ani-float"><div style="position:relative;width:70px;height:46px"><div style="position:absolute;bottom:0;left:0;right:0;height:24px;background:var(--text-secondary);opacity:.5;border-radius:12px"></div><div style="position:absolute;width:24px;height:24px;background:var(--text-secondary);opacity:.5;border-radius:50%;bottom:10px;left:8px"></div><div style="position:absolute;width:18px;height:18px;background:var(--text-secondary);opacity:.5;border-radius:50%;bottom:12px;left:26px"></div></div></div>';
      },
      rain: function(){
        return '<div class="wxs-ani-float"><div style="position:relative;width:70px;height:60px"><div style="position:absolute;top:2px;left:0;right:0;height:24px;background:var(--text-secondary);opacity:.5;border-radius:12px"></div><div style="position:absolute;width:24px;height:24px;background:var(--text-secondary);opacity:.5;border-radius:50%;top:2px;left:8px;transform:translateY(-8px)"></div><div style="position:absolute;width:18px;height:18px;background:var(--text-secondary);opacity:.5;border-radius:50%;top:2px;left:26px;transform:translateY(-6px)"></div><div style="position:absolute;bottom:2px;left:6px;right:6px;height:18px"><div class="wxs-drop" style="left:6px;height:9px;animation-delay:0s"></div><div class="wxs-drop" style="left:18px;height:11px;animation-delay:.25s"></div><div class="wxs-drop" style="left:30px;height:8px;animation-delay:.1s"></div><div class="wxs-drop" style="left:42px;height:10px;animation-delay:.45s"></div><div class="wxs-drop" style="left:54px;height:9px;animation-delay:.2s"></div></div></div></div>';
      },
      snow: function(){
        return '<div class="wxs-ani-float"><div style="position:relative;width:70px;height:60px"><div style="position:absolute;top:2px;left:0;right:0;height:24px;background:var(--text-secondary);opacity:.4;border-radius:12px"></div><div style="position:absolute;width:24px;height:24px;background:var(--text-secondary);opacity:.4;border-radius:50%;top:2px;left:8px;transform:translateY(-8px)"></div><div style="position:absolute;width:18px;height:18px;background:var(--text-secondary);opacity:.4;border-radius:50%;top:2px;left:26px;transform:translateY(-6px)"></div><div style="position:absolute;bottom:4px;left:4px;right:4px;height:16px"><div class="wxs-flake" style="left:8px;animation-delay:0s"></div><div class="wxs-flake" style="left:22px;animation-delay:.4s"></div><div class="wxs-flake" style="left:38px;animation-delay:.2s"></div><div class="wxs-flake" style="left:52px;animation-delay:.6s"></div></div></div></div>';
      },
      storm: function(){
        return '<div class="wxs-ani-float"><div style="position:relative;width:70px;height:64px"><div style="position:absolute;top:2px;left:0;right:0;height:24px;background:var(--text-secondary);opacity:.55;border-radius:12px"></div><div style="position:absolute;width:24px;height:24px;background:var(--text-secondary);opacity:.55;border-radius:50%;top:2px;left:8px;transform:translateY(-8px)"></div><div style="position:absolute;width:18px;height:18px;background:var(--text-secondary);opacity:.55;border-radius:50%;top:2px;left:26px;transform:translateY(-6px)"></div><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%)"><svg class="wxs-bolt" width="18" height="26" viewBox="0 0 18 26" fill="none"><path d="M11 2L3 14h7l-3 10 10-14h-7z" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" stroke-linejoin="round"/></svg></div></div></div>';
      },
    };

    function smallIcon(type, s){
      s = s || 18;
      if(type==='sun') return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="5" fill="#f59e0b" opacity=".9"/><line x1="10" y1="2" x2="10" y2="4" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="16" x2="10" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="10" x2="4" y2="10" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="10" x2="18" y2="10" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/></svg>';
      if(type==='partly') return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 20 20" fill="none"><circle cx="7" cy="8" r="4" fill="#f59e0b" opacity=".75"/><ellipse cx="11" cy="12" rx="6" ry="4" fill="var(--text-secondary)" opacity=".6"/><ellipse cx="7" cy="11" rx="5" ry="3.5" fill="var(--text-secondary)" opacity=".5"/></svg>';
      if(type==='cloud') return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 20 20" fill="none"><ellipse cx="7" cy="10" rx="4.5" ry="3.2" fill="var(--text-secondary)" opacity=".5"/><ellipse cx="12" cy="9" rx="5.5" ry="3.8" fill="var(--text-secondary)" opacity=".65"/></svg>';
      if(type==='rain') return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 20 20" fill="none"><ellipse cx="7" cy="9" rx="4.5" ry="3" fill="var(--text-secondary)" opacity=".5"/><ellipse cx="12" cy="8" rx="5.5" ry="3.5" fill="var(--text-secondary)" opacity=".65"/><line x1="7" y1="13" x2="5" y2="17" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="13" x2="10" y2="17" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/></svg>';
      if(type==='snow') return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 20 20" fill="none"><ellipse cx="7" cy="9" rx="4.5" ry="3" fill="var(--text-secondary)" opacity=".5"/><ellipse cx="12" cy="8" rx="5.5" ry="3.5" fill="var(--text-secondary)" opacity=".65"/><circle cx="7" cy="15" r="1.5" fill="#bfdbfe"/><circle cx="13" cy="15" r="1.5" fill="#bfdbfe"/></svg>';
      if(type==='storm') return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 20 20" fill="none"><ellipse cx="7" cy="8" rx="4.5" ry="3" fill="var(--text-secondary)" opacity=".55"/><ellipse cx="12" cy="7" rx="5.5" ry="3.5" fill="var(--text-secondary)" opacity=".7"/><path d="M11 11l-3 5h3l-2 4 5-6h-3z" fill="#f59e0b"/></svg>';
      return '';
    }

    function setIcon(type){
      var wrap = document.getElementById('wxs-icon');
      wrap.classList.remove('wxs-icon-in');
      wrap.classList.add('wxs-icon-out');
      setTimeout(function(){
        wrap.innerHTML = (ICONS[type] || ICONS.cloud)();
        wrap.classList.remove('wxs-icon-out');
        wrap.classList.add('wxs-icon-in');
      }, 220);
    }

    function buildDays(){
      var html = DAYS.map(function(d, i){
        return '<div class="wxs-day" data-i="'+i+'">' +
          '<div class="wxs-day-name">'+d.name+'</div>' +
          '<div class="wxs-day-icon">'+smallIcon(d.icon, 24)+'</div>' +
          '<div class="wxs-day-hi">'+d.hi+'°</div>' +
          '<div class="wxs-day-lo">'+d.lo+'°</div>' +
        '</div>';
      }).join('');
      document.getElementById('wxs-days').innerHTML = html;
      document.querySelectorAll('.wxs-day').forEach(function(el){
        el.addEventListener('click', function(){ selectDay(parseInt(el.dataset.i)); });
      });
    }

    function selectDay(i){
      var d = DAYS[i];
      var isSame = (i === activeDay);

      document.querySelectorAll('.wxs-day').forEach(function(el){
        el.classList.toggle('wxs-day-active', parseInt(el.dataset.i) === i);
      });

      var main = document.getElementById('wxs-main');
      main.style.animation = 'none';
      void main.offsetWidth;
      main.style.animation = 'wxs-fadein .3s ease';

      document.getElementById('wxs-temp').textContent = d.hi;
      document.getElementById('wxs-desc').textContent = d.desc;
      document.getElementById('wxs-feels').textContent = 'Feels like '+d.feels+UNIT+' \u00b7 H '+d.hi+'\u00b0 / L '+d.lo+'\u00b0';

      setIcon(d.icon);

      document.getElementById('wxs-sun-fill').style.width  = d.sunPct + '%';
      document.getElementById('wxs-sun-dot').style.left    = d.sunPct + '%';
      document.getElementById('wxs-sunrise').textContent   = d.srStr;
      document.getElementById('wxs-sunset').textContent    = d.ssStr;

      var hourly = document.getElementById('wxs-hourly');
      if(isSame && hourlyOpen){
        hourly.classList.remove('wxs-hourly-open');
        hourlyOpen = false;
      } else {
        document.getElementById('wxs-hourly-inner').innerHTML = d.hourly.map(function(h){
          return '<div class="wxs-h"><div class="wxs-h-time">'+h.t+'</div><div class="wxs-h-temp">'+h.c+'°</div></div>';
        }).join('');
        hourly.classList.add('wxs-hourly-open');
        hourlyOpen = true;
      }
      activeDay = i;
    }

    buildDays();
    setIcon("{{icon_type}}");
    selectDay(0);
  })();
  </script>
</div>
