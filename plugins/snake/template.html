<div class="snake-card" data-snake-widget data-initial-speed="{{initial_speed_ms}}">
  <div class="snake-header">
    <div class="snake-header-row">
      <div class="snake-title">
        <span>{{t_snake}}</span>
      </div>
      <div class="snake-header-actions">
        <button id="snake-fullscreen-btn" class="snake-btn snake-btn-secondary" title="{{t_toggle_fs}}">{{t_full_screen}}</button>
        <button id="snake-pause-btn" class="snake-btn snake-btn-secondary" disabled>{{t_pause}}</button>
        <button id="snake-sound-btn" class="snake-btn snake-btn-icon" title="Toggle Sound">
          <svg class="snake-sound-on" viewBox="0 0 24 24" width="24" height="24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/>
          </svg>
          <svg class="snake-sound-off snake-hidden" viewBox="0 0 24 24" width="24" height="24">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="snake-scoreboard">
      <div class="snake-score-box">
        <span class="snake-score-label">{{t_score}}</span>
        <span id="snake-current-score" class="snake-score-val">0</span>
      </div>
      <div class="snake-score-box">
        <span class="snake-score-label">{{t_high}}</span>
        <span id="snake-high-score" class="snake-score-val">0</span>
      </div>
    </div>
  </div>

  <div class="snake-body">
    <div class="snake-game-container">
      <canvas id="snake-canvas" width="400" height="400"></canvas>

      <div id="snake-overlay-start" class="snake-overlay">
        <div class="snake-end-card snake-end-card--start">
          <div class="snake-end-badge snake-end-badge--start" aria-hidden="true">🐍</div>
          <h2 class="snake-end-title">{{t_snake}}</h2>
          <p class="snake-end-meta">{{t_press_start}}</p>
          <button id="snake-start-btn" class="snake-btn snake-btn-primary">{{t_start_game}}</button>
        </div>
      </div>

      <div id="snake-overlay-gameover" class="snake-overlay snake-hidden">
        <div class="snake-end-card snake-end-card--lose">
          <div class="snake-end-badge snake-end-badge--lose" aria-hidden="true">✕</div>
          <h2 class="snake-end-title">{{t_game_over}}</h2>
          <p class="snake-end-scoreline">
            <span id="snake-final-score" class="snake-end-score">0</span>
            <span class="snake-end-score-label">{{t_points}}</span>
          </p>
          <p id="snake-gameover-extra" class="snake-end-meta">Best: 0</p>
          <button id="snake-restart-btn" class="snake-btn snake-btn-primary">{{t_play_again}}</button>
        </div>
      </div>

      <div id="snake-overlay-win" class="snake-overlay snake-hidden">
        <div class="snake-end-card snake-end-card--win">
          <div class="snake-end-badge snake-end-badge--win" aria-hidden="true">★</div>
          <h2 class="snake-end-title">{{t_you_win}}</h2>
          <p class="snake-end-meta">{{t_board_cleared}}</p>
          <p class="snake-end-scoreline">
            <span id="snake-win-score" class="snake-end-score">0</span>
            <span class="snake-end-score-label">{{t_points}}</span>
          </p>
          <p id="snake-win-extra" class="snake-end-meta"></p>
          <button id="snake-win-restart-btn" class="snake-btn snake-btn-primary">{{t_play_again}}</button>
        </div>
      </div>

      <div id="snake-overlay-paused" class="snake-overlay snake-hidden">
        <div class="snake-end-card snake-end-card--pause">
          <div class="snake-end-badge snake-end-badge--pause" aria-hidden="true">⏸</div>
          <h2 class="snake-end-title">{{t_paused}}</h2>
          <p class="snake-end-meta">{{t_press_resume}}</p>
          <button id="snake-resume-btn" class="snake-btn snake-btn-primary">{{t_resume}}</button>
        </div>
      </div>
    </div>

    <div class="snake-dpad">
      <div class="snake-dpad-row">
        <button id="snake-dpad-up" class="snake-dpad-btn" aria-label="Up">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M7 14l5-5 5 5H7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="snake-dpad-row">
        <button id="snake-dpad-left" class="snake-dpad-btn" aria-label="Left">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M14 17l-5-5 5-5v10z" fill="currentColor"/>
          </svg>
        </button>
        <div class="snake-dpad-center"></div>
        <button id="snake-dpad-right" class="snake-dpad-btn" aria-label="Right">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M10 17l5-5-5-5v10z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="snake-dpad-row">
        <button id="snake-dpad-down" class="snake-dpad-btn" aria-label="Down">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M7 10l5 5 5-5H7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
