<!doctype html>

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="degoog is an alternative search engine aggregator."
        />
        <link
            rel="icon"
            href="/public/favicon/favicon.ico?v=__APP_VERSION__"
            type="image/x-icon"
        />
        <link
            rel="manifest"
            href="/public/favicon/site.webmanifest"
            crossorigin="use-credentials"
        />
        <link
            rel="search"
            type="application/opensearchdescription+xml"
            title="degoog"
            href="/opensearch.xml"
        />
        <title>degoog</title>
        <script>
            (function () {
                var t = localStorage.getItem("theme");
                var r = document.documentElement;
                if (t === "light") r.setAttribute("data-theme", "light");
                else if (t === "dark") r.setAttribute("data-theme", "dark");
                else {
                    var m = window.matchMedia("(prefers-color-scheme: dark)");
                    r.setAttribute("data-theme", m.matches ? "dark" : "light");
                }
            })();
        </script>
        <link
            rel="preload"
            href="/themes/literallygoogle/fonts/google-sans/static/GoogleSans-Regular.ttf"
            as="font"
            type="font/ttf"
            crossorigin
        />
        <link rel="stylesheet" href="/theme/style.css?v=__APP_VERSION__" />

        <script>
            // Sticky media panel detection
            var el = document.querySelector(".media");
            if (el) {
                window.addEventListener("scroll", function () {
                    var stickyTop = parseInt(window.getComputedStyle(el).top);
                    var currentTop = el.getBoundingClientRect().top;
                    el.classList.toggle("is-pinned", currentTop === stickyTop);
                });
            }
        </script>
